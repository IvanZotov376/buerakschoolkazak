<script id="school-admin-unified-loader">
(function(){
if(window.__schoolGalleryMainLoaded)return;
const STORAGE_POSTS='school_admin_posts_v2', STORAGE_SCHEDULE='school_schedule_overrides_v2';
function roots(){const a=[];if(location.protocol==='http:'||location.protocol==='https:'){if(location.port==='5000')a.push(location.origin);a.push(`${location.protocol}//${location.hostname||'127.0.0.1'}:5000`)}a.push('http://127.0.0.1:5000','http://localhost:5000');return [...new Set(a)]}
async function apiFetch(path,opt={}){let last;for(const r of roots()){try{return await fetch(r+path,opt)}catch(e){last=e}}throw last||new Error('fetch failed')}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function fmt(v){const d=new Date(v);return Number.isNaN(d.getTime())?(v||''):d.toLocaleDateString('ru-RU')}
function localPosts(page){try{return (JSON.parse(localStorage.getItem(STORAGE_POSTS))||[]).filter(p=>p.page===page)}catch(e){return []}}
function canLike(){return localStorage.getItem('auth')==='true'&&!!String(localStorage.getItem('login')||'').trim()}
function likeKey(){const login=canLike()?String(localStorage.getItem('login')||'').trim().toLowerCase():'';return 'gallery_user_likes:'+(login||'guest')}
function getLikes(){if(!canLike())return [];try{return JSON.parse(localStorage.getItem(likeKey()))||[]}catch(e){return []}}
function setLikes(likes){if(canLike())localStorage.setItem(likeKey(),JSON.stringify([...new Set(likes)]))}
async function getPosts(page){let api=[];try{const r=await apiFetch('/api/admin/posts?page='+encodeURIComponent(page));const d=await r.json();api=d.posts||[]}catch(e){}const local=localPosts(page);const all=[...local,...api];const seen=new Set();return all.filter(p=>{const k=String(p.id||'')+'|'+String(p.page||'')+'|'+String(p.title||'')+'|'+String(p.created_at||'');if(seen.has(k))return false;seen.add(k);return true}).sort((a,b)=>(new Date(b.created_at||0))-(new Date(a.created_at||0)))}
async function renderPosts(page){const posts=await getPosts(page);if(!posts.length)return;document.querySelectorAll('.admin-dynamic-list,.admin-gallery-card,.admin-docs-dynamic').forEach(x=>x.remove());if(page==='news'||page==='warnings'){const box=document.createElement('div');box.className='admin-dynamic-list';box.innerHTML=posts.map(p=>`<article class="admin-dynamic-card"><h2>${page==='warnings'?'<b>'+esc(p.title)+'</b>':esc(p.title)}</h2><p>${esc(p.content)}</p><div class="admin-dynamic-images">${(p.files||[]).filter(f=>String(f.type||'').startsWith('image/')||String(f.path||'').startsWith('data:image')).map(f=>`<img src="${esc(f.path)}" alt="${esc(f.name)}">`).join('')}</div></article>`).join('');const content=document.querySelector('.content')||document.body;const h=content.querySelector('h1');h?h.insertAdjacentElement('afterend',box):content.prepend(box)}
if(page==='gallery'){const gallery=document.querySelector('.gallery');if(!gallery)return;const userLikes=getLikes();const html=posts.map(p=>{const img=(p.files||[]).find(f=>String(f.type||'').startsWith('image/')||String(f.path||'').startsWith('data:image'));if(!img)return '';const likeId='admin_'+p.id+'_0';const liked=userLikes.includes(likeId)||userLikes.includes(String(p.id));return `<div class="photo-card admin-gallery-card"><img src="${esc(img.path)}" alt="${esc(p.title)}"><div class="info-overlay"><span class="admin-gallery-desc">${esc(p.content||p.title)}</span><span class="admin-gallery-date">${esc(fmt(p.created_at))}</span><span class="admin-like-btn ${liked?'liked':''}" data-id="${esc(p.id)}" data-like-id="${esc(likeId)}"><i class="fa-solid fa-heart"></i> <b>${p.likes||0}</b></span></div></div>`}).join('');gallery.insertAdjacentHTML('afterbegin',html)}
if(page==='information'){const files=[];posts.forEach(p=>(p.files||[]).forEach(f=>files.push({title:p.title,content:p.content,...f,created_at:p.created_at})));if(!files.length)return;const box=document.createElement('div');box.className='admin-docs-dynamic';box.innerHTML='<h2>Документы</h2>'+files.map(f=>`<a class="doc-link" href="${esc(f.path)}" target="_blank"><i class="fa-solid fa-file-lines"></i> ${esc(f.title||f.name||'Документ')}</a>`).join('');const content=document.querySelector('.content')||document.body;const target=[...document.querySelectorAll('h2,h3')].find(x=>/документ/i.test(x.textContent));target?target.insertAdjacentElement('afterend',box):content.prepend(box)} }
async function applySchedule(){let rows=[];try{const r=await apiFetch('/api/schedule/overrides');const d=await r.json();rows=d.overrides||[]}catch(e){try{rows=JSON.parse(localStorage.getItem(STORAGE_SCHEDULE))||[]}catch(_){rows=[]}}if(!rows.length)return;const norm=s=>String(s||'').replace(/\s+/g,' ').trim().toLowerCase();rows.forEach(o=>{document.querySelectorAll('table').forEach(table=>{const heads=[...table.querySelectorAll('thead th')].map(th=>norm(th.textContent));let classIdx=heads.findIndex(h=>h===norm(o.class_name));if(classIdx<0)classIdx=heads.findIndex(h=>h.includes(norm(o.class_name))||norm(o.class_name).includes(h));if(classIdx<0)return;[...table.querySelectorAll('tbody tr')].forEach(tr=>{const cells=[...tr.children];if(!cells.length||norm(cells[0].textContent)!==norm(o.day))return;const cell=cells[classIdx];if(!cell)return;const rows=[...cell.querySelectorAll('.lesson-row, div, p, li')];let done=false;rows.forEach(row=>{const text=String(row.textContent||'');const num=(text.match(/^\s*(\d+)/)||[])[1];if(String(num||'')===String(o.lesson_number)){let name=row.querySelector('.lesson-name');if(name)name.textContent=o.subject;else row.innerHTML=String(row.innerHTML).replace(/(\d+\.?\s*)[^<\n]*/, '$1'+esc(o.subject));done=true;}});if(!done)cell.insertAdjacentHTML('beforeend',`<div class="lesson-row"><span class="lesson-num">${esc(o.lesson_number)}.</span> <span class="lesson-name admin-replaced">${esc(o.subject)}</span></div>`)})})})}
const page=(location.pathname.split('/').pop()||'').toLowerCase();if(page==='news.html')renderPosts('news');if(page==='warnings.html')renderPosts('warnings');if(page==='gallery.html'&&!window.__schoolGalleryMainLoaded)renderPosts('gallery');if(page==='information.html'||page==='total.html')renderPosts('information');if(page==='rasp.html')applySchedule();
document.addEventListener('click',async e=>{const btn=e.target.closest('.admin-like-btn');if(!btn||btn.classList.contains('liked'))return;e.preventDefault();if(!canLike())return;const likes=getLikes();likes.push(btn.dataset.likeId||btn.dataset.id);setLikes(likes);try{const rr=await apiFetch(`/api/admin/gallery/${btn.dataset.id}/like`,{method:'POST'});const dd=await rr.json();btn.querySelector('b').textContent=dd.likes||0}catch(_){btn.querySelector('b').textContent=String((parseInt(btn.querySelector('b').textContent)||0)+1)}btn.classList.add('liked')});
})();
</script>
