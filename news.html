<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости</title>
    <link rel="icon" type="image/png" href="logo1.png">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="footer.css">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            transition: font-size 0.2s;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: #e9e9e9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ----- ХЕДЕР ----- */
        .header {
            background: linear-gradient(270deg, #2ea3d0, #3a5fa0, #2ea3d0);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
            color: white;
            padding: 20px 0;
            transition: background 0.3s;
        }

        @keyframes gradientMove {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .logo img {
            width: 80px;
            transition: filter 0.3s;
        }

        .title {
            flex: 1;
            margin-left: 20px;
        }

        .title h1 {
            font-weight: 800;
            font-size: 1.5rem;
        }

        .title p {
            font-weight: 700;
            font-size: 0.875rem;
        }

        .header-icons {
            display: flex;
            gap: 15px;
            align-items: center;
            position: relative;
        }

        .user-block {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .user-block:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background-size: cover;
            background-position: center;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .user-name {
            font-weight: 800;
            font-size: 0.9rem;
            line-height: 1.2;
        }

        .user-role {
            font-size: 0.75rem;
            opacity: 0.85;
            line-height: 1.2;
        }

        .header-icons>i {
            font-size: 1.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .header-icons>i.active-icon {
            color: #ffd966;
        }

        /* ----- ПАНЕЛЬ ДОСТУПНОСТИ ----- */
        .accessibility-panel {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            padding: 30px;
            z-index: 1000;
            width: 480px;
            margin-top: 10px;
            color: #333;
            font-family: 'Raleway', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .accessibility-panel.active {
            display: block;
        }

        .accessibility-panel h4 {
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 1.125rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option-group {
            margin-bottom: 20px;
        }

        .option-group label {
            display: block;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .option-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 6px 14px;
            border: 2px solid #ccc;
            background: #f8f8f8;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .option-btn.active {
            background: #2ea3d0;
            color: white;
            border-color: #2ea3d0;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.95rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .close-panel {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: #666;
            transition: color 0.2s;
        }

        .close-panel:hover {
            color: #000;
        }

        /* ----- НАВИГАЦИЯ ----- */
        .nav {
            margin-top: 25px;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: background-color 0.3s, color 0.3s;
        }

        .menu {
            display: flex;
            justify-content: space-between;
            list-style: none;
        }

        .menu li {
            position: relative;
        }

        .menu>li>a {
            text-decoration: none;
            font-weight: 800;
            color: black;
            padding: 10px 15px;
            display: block;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 1rem;
        }

        .menu>li>a:hover {
            background: #2ea3d0;
            color: white;
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            min-width: 180px;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: all 0.25s ease;
            z-index: 10;
        }

        .menu li:hover .dropdown {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .dropdown li {
            list-style: none;
        }

        .dropdown a {
            display: block;
            padding: 12px 15px;
            font-weight: 700;
            color: black;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .dropdown a:hover {
            background: #2ea3d0;
            color: white;
        }

        /* ----- ОСНОВНОЙ КОНТЕНТ ----- */
        .content {
            padding: 40px 20px;
            flex: 1;
        }

        /* ----- ТЕМЫ ----- */
        body.dark-theme {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark-theme .header {
            background: linear-gradient(270deg, #0f3b47, #1a2b5e, #0f3b47);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
        }
        body.dark-theme .nav {
            background: #1e1e1e;
        }
        body.dark-theme .menu>li>a {
            color: #e0e0e0;
        }
        body.dark-theme .menu>li>a:hover {
            background: #3a506b;
            color: white;
        }
        body.dark-theme .dropdown {
            background: #2a2a2a;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        body.dark-theme .dropdown a {
            color: #e0e0e0;
        }
        body.dark-theme .dropdown a:hover {
            background: #3a506b;
            color: white;
        }
        body.dark-theme .accessibility-panel {
            background: #2a2a2a;
            color: #e0e0e0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }
        body.dark-theme .option-btn {
            background: #3a3a3a;
            border-color: #555;
            color: #ccc;
        }
        body.dark-theme .option-btn.active {
            background: #2ea3d0;
            color: white;
            border-color: #2ea3d0;
        }
        body.dark-theme .close-panel {
            color: #aaa;
        }
        body.dark-theme .close-panel:hover {
            color: white;
        }

        body.blue-theme {
            background-color: #d4eafc;
            color: #000;
        }
        body.blue-theme .header {
            background: linear-gradient(270deg, #1e88e5, #1565c0, #1e88e5);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
        }
        body.blue-theme .nav {
            background: #bbdefb;
        }
        body.blue-theme .menu>li>a {
            color: #000;
        }
        body.blue-theme .menu>li>a:hover {
            background: #1e88e5;
            color: white;
        }
        body.blue-theme .dropdown {
            background: #e3f2fd;
        }
        body.blue-theme .accessibility-panel {
            background: #e3f2fd;
            color: #0d47a1;
        }
        body.blue-theme .option-btn {
            background: #bbdefb;
            border-color: #90caf9;
            color: #0d47a1;
        }
        body.blue-theme .option-btn.active {
            background: #1e88e5;
            color: white;
        }

        body.no-effects .header {
            background: #2c3e50;
            animation: none;
        }
        body.dark-theme.no-effects .header {
            background: #0d1b2a;
        }
        body.blue-theme.no-effects .header {
            background: #1565c0;
        }

        html.font-size-1 { font-size: 100%; }
        html.font-size-2 { font-size: 125%; }
        html.font-size-3 { font-size: 150%; }
        html.font-size-4 { font-size: 175%; }

        body.images-grayscale img { filter: grayscale(100%); }
        body.images-hide img { display: none; }



        /* ----- СТИЛИ СТРАНИЦЫ НОВОСТЕЙ ----- */
        .page-title {
            text-align: center;
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .vk-block {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body.dark-theme .page-title {
            color: #fff;
        }

        body.dark-theme .vk-block {
            background: #1e1e1e;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        body.blue-theme .page-title {
            color: #0d47a1;
        }

        body.blue-theme .vk-block {
            background: #e3f2fd;
        }

        @media (max-width: 768px) {
            .accessibility-panel { width: 90vw; right: -10px; padding: 20px; }
            .user-info { display: none; }
            .user-avatar { width: 36px; height: 36px; font-size: 1rem; }
        }

    
        /* ----- HERO-БЛОК ТИТУЛА С АНИМИРОВАННЫМИ КРУГАМИ ----- */
        .title-hero { width: 100%; position: relative; overflow: hidden; border-radius: 28px; padding: 38px 42px; margin-bottom: 32px; color: #ffffff; background: linear-gradient(135deg, #2ea3d0 0%, #3a5fa0 72%); box-shadow: 0 18px 40px rgba(46, 93, 160, 0.22); text-align: left; }
        .title-hero h1 { color: #ffffff; font-size: 2.35rem; font-weight: 800; line-height: 1.15; margin: 0 0 8px; text-align: center; position: relative; z-index: 2; }
        .title-hero p { color: #ffffff; font-weight: 700; opacity: 0.92; max-width: 680px; line-height: 1.5; margin: 0; position: relative; z-index: 2; }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px; background: rgba(255, 255, 255, 0.18); font-weight: 800; font-size: 0.92rem; margin-bottom: 14px; position: relative; z-index: 2; }
        .hero-circle { position: absolute; width: var(--size); height: var(--size); top: var(--top); left: var(--left); border-radius: 50%; background: rgba(255, 255, 255, var(--opacity)); pointer-events: none; z-index: 0; filter: blur(var(--blur)); animation-name: var(--move); animation-duration: var(--duration); animation-timing-function: ease-in-out; animation-iteration-count: infinite; animation-direction: alternate; animation-delay: var(--delay); will-change: transform; }
        .hero-circle:nth-child(1) { --size: 230px; --top: -82px; --left: 78%; --opacity: 0.16; --blur: 0px; --duration: 44s; --delay: -12s; --move: floatChaosOne; }
        .hero-circle:nth-child(2) { --size: 118px; --top: 18px; --left: 6%; --opacity: 0.14; --blur: 0.3px; --duration: 36s; --delay: -7s; --move: floatChaosTwo; }
        .hero-circle:nth-child(3) { --size: 72px; --top: 64%; --left: 19%; --opacity: 0.22; --blur: 0px; --duration: 31s; --delay: -16s; --move: floatChaosThree; }
        .hero-circle:nth-child(4) { --size: 154px; --top: 48%; --left: 58%; --opacity: 0.10; --blur: 0.5px; --duration: 52s; --delay: -21s; --move: floatChaosFour; }
        .hero-circle:nth-child(5) { --size: 48px; --top: 19%; --left: 44%; --opacity: 0.26; --blur: 0px; --duration: 28s; --delay: -4s; --move: floatChaosFive; }
        .hero-circle:nth-child(6) { --size: 96px; --top: 74%; --left: 84%; --opacity: 0.13; --blur: 0.4px; --duration: 40s; --delay: -25s; --move: floatChaosSix; }
        .hero-circle:nth-child(7) { --size: 34px; --top: 38%; --left: 31%; --opacity: 0.30; --blur: 0px; --duration: 33s; --delay: -10s; --move: floatChaosSeven; }
        @keyframes floatChaosOne { 0% { transform: translate(0, 0) scale(1); } 30% { transform: translate(-110px, 34px) scale(1.04); } 63% { transform: translate(-42px, 130px) scale(0.96); } 100% { transform: translate(-170px, 86px) scale(1.02); } }
        @keyframes floatChaosTwo { 0% { transform: translate(0, 0) scale(1); } 28% { transform: translate(105px, 36px) scale(0.98); } 61% { transform: translate(44px, 92px) scale(1.06); } 100% { transform: translate(160px, -8px) scale(1); } }
        @keyframes floatChaosThree { 0% { transform: translate(0, 0) scale(1); } 34% { transform: translate(64px, -58px) scale(1.08); } 67% { transform: translate(-38px, -96px) scale(0.94); } 100% { transform: translate(118px, -22px) scale(1.03); } }
        @keyframes floatChaosFour { 0% { transform: translate(0, 0) scale(1); } 27% { transform: translate(-76px, -52px) scale(0.97); } 58% { transform: translate(84px, -104px) scale(1.05); } 100% { transform: translate(30px, 42px) scale(0.99); } }
        @keyframes floatChaosFive { 0% { transform: translate(0, 0) scale(1); } 35% { transform: translate(92px, 38px) scale(1.1); } 70% { transform: translate(28px, 112px) scale(0.92); } 100% { transform: translate(-82px, 62px) scale(1.04); } }
        @keyframes floatChaosSix { 0% { transform: translate(0, 0) scale(1); } 32% { transform: translate(-132px, -26px) scale(1.04); } 66% { transform: translate(-68px, -112px) scale(0.95); } 100% { transform: translate(-190px, -54px) scale(1.01); } }
        @keyframes floatChaosSeven { 0% { transform: translate(0, 0) scale(1); } 25% { transform: translate(-48px, 64px) scale(1.12); } 55% { transform: translate(86px, 28px) scale(0.9); } 100% { transform: translate(24px, -72px) scale(1.05); } }
        body.no-effects .hero-circle { animation: none; }
        @media (max-width: 900px) { .title-hero { padding: 30px 24px; border-radius: 22px; } .title-hero h1 { font-size: 1.85rem; } }
        @media (max-width: 768px) { .hero-circle:nth-child(1) { --size: 150px; } .hero-circle:nth-child(2) { --size: 88px; } .hero-circle:nth-child(3) { --size: 54px; } .hero-circle:nth-child(4) { --size: 104px; } .hero-circle:nth-child(5) { --size: 38px; } .hero-circle:nth-child(6) { --size: 72px; } .hero-circle:nth-child(7) { --size: 28px; } }


        .news-layout {
            display: grid;
            grid-template-columns: minmax(0, 3fr) minmax(320px, 2fr);
            gap: 24px;
            align-items: stretch;
            width: 100%;
        }

        .news-panel,
        .vk-widget-panel {
            background: white;
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .news-panel-header,
        .vk-widget-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .news-panel-title,
        .vk-widget-title {
            font-weight: 800;
            font-size: 1.35rem;
            color: #2c3e50;
        }

        .vk-source-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2ea3d0;
            text-decoration: none;
            font-weight: 800;
            white-space: nowrap;
        }

        .vk-source-link:hover { text-decoration: underline; }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-height: 300px;
        }

        .news-count {
            color: #607080;
            font-weight: 800;
            margin-bottom: 12px;
            font-size: 0.92rem;
        }

        .news-card {
            border: 1px solid rgba(46, 163, 208, 0.16);
            border-radius: 18px;
            padding: 18px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbfd 100%);
            box-shadow: 0 8px 18px rgba(46, 93, 160, 0.08);
            overflow: hidden;
        }

        .news-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            color: #607080;
            font-weight: 700;
            font-size: 0.92rem;
        }

        .news-card-title {
            font-size: 1.18rem;
            line-height: 1.35;
            font-weight: 800;
            color: #25364a;
            margin-bottom: 10px;
        }

        .news-card-text {
            color: #333;
            line-height: 1.62;
            white-space: pre-line;
            overflow-wrap: anywhere;
        }

        .news-card-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .news-card-images img {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.06);
        }

        .news-card-actions {
            margin-top: 14px;
            display: flex;
            justify-content: flex-end;
        }

        .news-read-more {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            background: #2ea3d0;
            color: #fff;
            padding: 9px 14px;
            text-decoration: none;
            font-weight: 800;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .news-read-more:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(46, 163, 208, 0.28);
        }

        .news-empty,
        .news-loading {
            padding: 28px;
            text-align: center;
            border-radius: 18px;
            background: #f4f8fb;
            color: #526476;
            font-weight: 700;
            line-height: 1.5;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 24px;
        }

        .pagination button {
            min-width: 42px;
            height: 42px;
            border: 2px solid rgba(46, 163, 208, 0.25);
            background: #ffffff;
            color: #2c3e50;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled),
        .pagination button.active {
            background: #2ea3d0;
            color: #ffffff;
            border-color: #2ea3d0;
        }

        .pagination button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .vk-widget-note {
            margin-top: 12px;
            color: #607080;
            font-size: 0.9rem;
            line-height: 1.45;
        }


        .vk-widget-panel {
            width: 100%;
            max-width: none;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .news-panel {
            min-width: 0;
        }

        #vk_groups {
            width: 100% !important;
            flex: 1;
            min-height: 520px;
        }

        #vk_groups iframe {
            width: 100% !important;
            max-width: 100% !important;
            min-height: 520px;
        }

        body.dark-theme .news-panel,
        body.dark-theme .vk-widget-panel,
        body.dark-theme .news-card,
        body.dark-theme .pagination button {
            background: #1e1e1e;
            color: #e0e0e0;
            border-color: rgba(255,255,255,0.12);
        }

        body.dark-theme .news-card { background: linear-gradient(180deg, #232323 0%, #1b1b1b 100%); }
        body.dark-theme .news-panel-title,
        body.dark-theme .vk-widget-title,
        body.dark-theme .news-card-title { color: #ffffff; }
        body.dark-theme .news-card-text { color: #dddddd; }
        body.dark-theme .news-empty,
        body.dark-theme .news-loading { background: #272727; color: #d5d5d5; }

        body.blue-theme .news-panel,
        body.blue-theme .vk-widget-panel,
        body.blue-theme .news-card,
        body.blue-theme .pagination button { background: #e3f2fd; }
        body.blue-theme .news-card { background: linear-gradient(180deg, #eaf6ff 0%, #d9efff 100%); }
        body.blue-theme .news-panel-title,
        body.blue-theme .vk-widget-title,
        body.blue-theme .news-card-title { color: #0d47a1; }

        @media (max-width: 980px) {
            .news-layout { grid-template-columns: 1fr; }
            .vk-widget-panel { max-width: none; width: 100%; margin: 0; }
        }

        @media (max-width: 560px) {
            .news-panel, .vk-widget-panel { padding: 16px; border-radius: 16px; }
            .news-panel-header { align-items: flex-start; flex-direction: column; }
            .news-card { padding: 14px; }

.admin-dynamic-list{max-width:1100px;margin:0 auto 30px;display:flex;flex-direction:column;gap:20px}.admin-dynamic-card{background:#fff;border-radius:18px;box-shadow:0 4px 14px rgba(0,0,0,.1);padding:22px}.admin-dynamic-card h2,.admin-dynamic-card h3{font-weight:800;color:#2c3e50;margin-bottom:10px}.admin-dynamic-card p{line-height:1.65;white-space:pre-wrap}.admin-dynamic-images{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}.admin-dynamic-images img{width:220px;height:150px;object-fit:cover;border-radius:14px}body.dark-theme .admin-dynamic-card{background:#1e1e1e;color:#e0e0e0}body.dark-theme .admin-dynamic-card h2,body.dark-theme .admin-dynamic-card h3{color:#fff}

</style>

<body>

<main class="content">

            <span class="hero-circle" aria-hidden="true"></span>
            <span class="hero-circle" aria-hidden="true"></span>
            <span class="hero-circle" aria-hidden="true"></span>
            <span class="hero-circle" aria-hidden="true"></span>

<script>
    (function() {
        // ----- ЗАГРУЗКА HEADER -----
        fetch('header.html')
            .then(res => {
                if (!res.ok) throw new Error('Ошибка загрузки header.html');
                return res.text();
            })
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
                initHeaderAfterLoad();
            })
            .catch(err => console.error(err));

        // ----- ИНИЦИАЛИЗАЦИЯ ПОСЛЕ ЗАГРУЗКИ -----
        function initHeaderAfterLoad() {
            const accessibilityBtn = document.getElementById('accessibilityBtn');
            const panel = document.getElementById('accessibilityPanel');
            const closePanelBtn = document.getElementById('closeAccessibilityPanel');
            const noEffectsCheckbox = document.getElementById('noEffectsCheckbox');
            const themeBtns = document.querySelectorAll('[data-group="theme"] .option-btn');
            const fontSizeBtns = document.querySelectorAll('[data-group="fontSize"] .option-btn');
            const imageModeBtns = document.querySelectorAll('[data-group="imageMode"] .option-btn');
            const userBlock = document.getElementById('userBlock');
            const userAvatar = document.getElementById('userAvatar');
            const userNameSpan = document.getElementById('userName');
            const userRoleSpan = document.getElementById('userRole');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');

            let settings = {
                theme: localStorage.getItem('a11y_theme') || 'original',
                fontSize: localStorage.getItem('a11y_fontSize') || '1',
                noEffects: localStorage.getItem('a11y_noEffects') === 'true',
                imageMode: localStorage.getItem('a11y_imageMode') || 'original'
            };

            function applySettings() {
                document.body.classList.remove('dark-theme', 'blue-theme');
                if (settings.theme === 'dark') document.body.classList.add('dark-theme');
                else if (settings.theme === 'blue') document.body.classList.add('blue-theme');
                document.documentElement.classList.remove('font-size-1', 'font-size-2', 'font-size-3', 'font-size-4');
                document.documentElement.classList.add('font-size-' + settings.fontSize);
                if (settings.noEffects) document.body.classList.add('no-effects');
                else document.body.classList.remove('no-effects');
                document.body.classList.remove('images-grayscale', 'images-hide');
                if (settings.imageMode === 'grayscale') document.body.classList.add('images-grayscale');
                else if (settings.imageMode === 'hide') document.body.classList.add('images-hide');
                updatePanelButtons();
                if (noEffectsCheckbox) noEffectsCheckbox.checked = settings.noEffects;
            }

            function updatePanelButtons() {
                themeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.value === settings.theme));
                fontSizeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.value === settings.fontSize));
                imageModeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.value === settings.imageMode));
            }

            function saveSettings() {
                localStorage.setItem('a11y_theme', settings.theme);
                localStorage.setItem('a11y_fontSize', settings.fontSize);
                localStorage.setItem('a11y_noEffects', settings.noEffects);
                localStorage.setItem('a11y_imageMode', settings.imageMode);
            }

            themeBtns.forEach(btn => btn.addEventListener('click', () => { settings.theme = btn.dataset.value; saveSettings(); applySettings(); }));
            fontSizeBtns.forEach(btn => btn.addEventListener('click', () => { settings.fontSize = btn.dataset.value; saveSettings(); applySettings(); }));
            imageModeBtns.forEach(btn => btn.addEventListener('click', () => { settings.imageMode = btn.dataset.value; saveSettings(); applySettings(); }));
            if (noEffectsCheckbox) noEffectsCheckbox.addEventListener('change', () => { settings.noEffects = noEffectsCheckbox.checked; saveSettings(); applySettings(); });

            function togglePanel() {
                panel.classList.toggle('active');
                if (accessibilityBtn) accessibilityBtn.classList.toggle('active-icon', panel.classList.contains('active'));
            }
            accessibilityBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePanel(); });
            closePanelBtn.addEventListener('click', () => { panel.classList.remove('active'); accessibilityBtn.classList.remove('active-icon'); });
            document.addEventListener('click', (e) => {
                if (panel && !panel.contains(e.target) && e.target !== accessibilityBtn) {
                    panel.classList.remove('active');
                    accessibilityBtn.classList.remove('active-icon');
                }
            });

            applySettings();

            // Авторизация
            const API_URL = (() => {
                if (window.location.protocol.startsWith('http')) {
                    const host = window.location.hostname || '127.0.0.1';
                    return `${window.location.protocol}//${host}:5000`;
                }
                return 'http://127.0.0.1:5000';
            })();

            const isAuth = localStorage.getItem('auth') === 'true';
            const savedLogin = localStorage.getItem('login');
            let savedRole = localStorage.getItem('role') || '';
            let savedFullName = localStorage.getItem('full_name') || savedLogin;
            let savedAvatarColor = localStorage.getItem('avatar_color') || null;
            let savedProfilePhoto = localStorage.getItem('profile_photo') || '';

            function getInitials(name) { return name ? name.charAt(0).toUpperCase() : '?'; }
            function getDefaultAvatarColor(name) {
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                const colors = [
                    'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                    'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                    'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                    'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
                ];
                return colors[Math.abs(hash) % colors.length];
            }

            function setAvatarElement(el, name, color, photo) {
                if (!el) return;
                if (photo) {
                    el.style.background = 'transparent';
                    el.style.backgroundImage = `url(${photo})`;
                    el.style.backgroundSize = 'cover';
                    el.style.backgroundPosition = 'center';
                    el.textContent = '';
                } else {
                    el.style.backgroundImage = '';
                    el.style.background = color || getDefaultAvatarColor(name || savedLogin);
                    el.textContent = getInitials(name || savedLogin);
                }
            }

            function updateUserInterface() {
                if (isAuth && savedLogin) {
                    if (userBlock) userBlock.style.display = 'flex';
                    if (loginBtn) loginBtn.style.display = 'none';
                    if (logoutBtn) logoutBtn.style.display = 'inline-block';
                    const displayName = savedFullName || savedLogin;
                    const avatarColor = savedAvatarColor || getDefaultAvatarColor(displayName);
                    setAvatarElement(userAvatar, displayName, avatarColor, savedProfilePhoto);
                    if (userNameSpan) userNameSpan.textContent = displayName;
                    if (userRoleSpan) userRoleSpan.textContent = savedRole || 'Гость';
                } else {
                    if (userBlock) userBlock.style.display = 'none';
                    if (loginBtn) loginBtn.style.display = 'inline-block';
                    if (logoutBtn) logoutBtn.style.display = 'none';
                }
            }

            async function loadHeaderUserInfo() {
                if (!isAuth || !savedLogin) return;
                updateUserInterface();
                try {
                    const response = await fetch(`${API_URL}/api/user_info?login=${encodeURIComponent(savedLogin)}`, { mode: 'cors' });
                    const data = await response.json();
                    if (data.success && data.user) {
                        savedRole = savedRole || data.user.role || '';
                        savedFullName = savedFullName || data.user.full_name || savedLogin;
                        savedAvatarColor = savedAvatarColor || data.user.avatar_color;
                        savedProfilePhoto = savedProfilePhoto || data.user.profile_photo || '';

                        localStorage.setItem('role', savedRole);
                        localStorage.setItem('full_name', savedFullName);
                        if (savedAvatarColor) localStorage.setItem('avatar_color', savedAvatarColor);
                        if (savedProfilePhoto) localStorage.setItem('profile_photo', savedProfilePhoto);
                        else localStorage.removeItem('profile_photo');

                        updateUserInterface();
                    }
                } catch (err) {
                    console.error('Не удалось загрузить фото профиля:', err);
                }
            }

            loadHeaderUserInfo();
            function getProfilePageByRole() {
                const role = String(localStorage.getItem('role') || '').trim().toLowerCase();
                if (['ученик', 'родитель'].includes(role)) return 'lk.html';
                if (['учитель', 'преподаватель'].includes(role)) return 'lkteacher.html';
                if (['директор', 'администратор', 'администрация'].includes(role)) return 'lkadmin.html';
                if (role === 'гость') return 'index.html';
                return 'lk.html';
            }
            if (userBlock) userBlock.onclick = () => { if (isAuth && savedLogin) window.location.href = getProfilePageByRole(); };
            if (loginBtn) loginBtn.onclick = () => { window.location.href = 'login.html'; };
            if (logoutBtn) logoutBtn.onclick = () => {
                if (confirm('Вы уверены, что хотите выйти?')) {
                    localStorage.removeItem('auth');
                    localStorage.removeItem('login');
                    localStorage.removeItem('password');
                    localStorage.removeItem('role');
                    localStorage.removeItem('full_name');
                    localStorage.removeItem('avatar_color');
                    localStorage.removeItem('profile_photo');
                    location.reload();
                }
            };
        }
    })();
</script>

<script>
    // Новости из панели администратора
    (function() {
        const POSTS_PER_PAGE = 3;
        const STORAGE_POSTS = 'school_admin_posts_v2';
        const API_URLS = (() => {
            const urls = [];
            if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                if (window.location.port === '5000') urls.push(window.location.origin);
                urls.push(`${window.location.protocol}//${window.location.hostname || '127.0.0.1'}:5000`);
            }
            urls.push('http://127.0.0.1:5000', 'http://localhost:5000');
            return [...new Set(urls)];
        })();

        const listEl = document.getElementById('newsList');
        const paginationEl = document.getElementById('newsPagination');
        let posts = [];
        let currentPage = 1;

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDate(value) {
            if (!value) return '';
            const date = new Date(value);
            if (!Number.isNaN(date.getTime())) {
                return date.toLocaleDateString('ru-RU', { day: '2-digit', month: 'long', year: 'numeric' });
            }
            return value;
        }

        function normalizeFilePath(path) {
            const value = String(path || '').trim();
            if (!value) return '';
            if (/^(data:|https?:\/\/|\/)/i.test(value)) return value;
            return API_URLS[0] + '/' + value.replace(/^\/+/, '');
        }

        function normalizePost(post) {
            const files = Array.isArray(post.files) ? post.files : [];
            return {
                id: post.id || `${post.title || ''}_${post.created_at || ''}`,
                title: post.title || 'Новость',
                content: post.content || '',
                author: post.author || 'Администрация школы',
                created_at: post.created_at || post.date || '',
                files: files.map(file => ({
                    ...file,
                    path: normalizeFilePath(file.path),
                    type: file.type || '',
                    name: file.name || 'Файл'
                }))
            };
        }

        function getLocalPosts() {
            try {
                return (JSON.parse(localStorage.getItem(STORAGE_POSTS)) || [])
                    .filter(post => post.page === 'news')
                    .map(normalizePost);
            } catch (error) {
                return [];
            }
        }

        async function fetchFromApi(path) {
            let lastError = null;
            for (const baseUrl of API_URLS) {
                try {
                    const response = await fetch(baseUrl + path, { mode: 'cors', cache: 'no-store' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error('server.py не отвечает');
        }

        async function getAdminPosts() {
            const endpoints = [
                '/api/admin/posts?page=news',
                '/api/site/posts?page=news',
                '/api/posts?page=news'
            ];

            for (const endpoint of endpoints) {
                try {
                    const data = await fetchFromApi(endpoint);
                    const apiPosts = Array.isArray(data.posts) ? data.posts : (Array.isArray(data.data) ? data.data : []);
                    if (apiPosts.length) return apiPosts.map(normalizePost);
                } catch (error) {
                    console.warn('Не удалось загрузить новости:', endpoint, error);
                }
            }

            return getLocalPosts();
        }

        function renderPosts() {
            if (!listEl || !paginationEl) return;

            if (!posts.length) {
                listEl.innerHTML = '<div class="news-empty">Новости пока не добавлены. Добавьте публикацию в панели администратора в раздел «Новости».</div>';
                paginationEl.innerHTML = '';
                return;
            }

            const totalPages = Math.max(1, Math.ceil(posts.length / POSTS_PER_PAGE));
            currentPage = Math.min(Math.max(currentPage, 1), totalPages);
            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const pagePosts = posts.slice(start, start + POSTS_PER_PAGE);

            listEl.innerHTML = pagePosts.map(post => {
                const title = escapeHtml(post.title);
                const content = escapeHtml(post.content);
                const date = escapeHtml(formatDate(post.created_at));
                const images = post.files.filter(file => String(file.type || '').startsWith('image/') || String(file.path || '').startsWith('data:image'));
                const documents = post.files.filter(file => !images.includes(file));
                const imagesHtml = images.length ? `<div class="news-card-images">${images.map(file => `<img src="${escapeHtml(file.path)}" alt="${escapeHtml(file.name || post.title)}" loading="lazy">`).join('')}</div>` : '';
                const docsHtml = documents.length ? `<div class="news-card-actions">${documents.map(file => `<a class="news-read-more" href="${escapeHtml(file.path)}" target="_blank" rel="noopener"><i class="fa-solid fa-paperclip"></i> ${escapeHtml(file.name || 'Файл')}</a>`).join('')}</div>` : '';

                return `
                    <article class="news-card">
                        <div class="news-card-top">
                            <time><i class="fa-solid fa-calendar-days"></i> ${date}</time>
                        </div>
                        <h3 class="news-card-title">${title}</h3>
                        ${content ? `<div class="news-card-text">${content}</div>` : ''}
                        ${imagesHtml}
                        ${docsHtml}
                    </article>`;
            }).join('');

            renderPagination(totalPages);
            syncVkWidget();
        }

        function renderPagination(totalPages) {
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            const buttons = [];
            buttons.push(`<button type="button" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}" aria-label="Предыдущая страница">‹</button>`);
            for (let page = 1; page <= totalPages; page++) {
                buttons.push(`<button type="button" class="${page === currentPage ? 'active' : ''}" data-page="${page}" aria-label="Страница ${page}">${page}</button>`);
            }
            buttons.push(`<button type="button" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}" aria-label="Следующая страница">›</button>`);
            paginationEl.innerHTML = buttons.join('');
        }

        if (paginationEl) {
            paginationEl.addEventListener('click', (event) => {
                const btn = event.target.closest('button[data-page]');
                if (!btn || btn.disabled) return;
                currentPage = Number(btn.dataset.page) || 1;
                renderPosts();
                document.querySelector('.news-panel')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }

        async function loadAdminNews() {
            try {
                posts = await getAdminPosts();
                posts.sort((a, b) => {
                    const byDate = new Date(b.created_at || 0) - new Date(a.created_at || 0);
                    if (byDate) return byDate;
                    return Number(b.id || 0) - Number(a.id || 0);
                });
            } catch (error) {
                console.error('Не удалось загрузить новости из панели администратора:', error);
                posts = getLocalPosts();
            }
            renderPosts();
        }

        let vkWidgetRendered = false;

        function getVkWidgetSize() {
            const panel = document.querySelector('.vk-widget-panel');
            const newsPanel = document.querySelector('.news-panel');
            const panelWidth = panel ? Math.max(300, Math.floor(panel.getBoundingClientRect().width - 44)) : 420;
            const newsHeight = newsPanel ? Math.max(520, Math.floor(newsPanel.getBoundingClientRect().height - 86)) : 620;
            return { width: panelWidth, height: newsHeight };
        }

        function initVkWidget(force) {
            if (typeof VK === 'undefined' || !VK.Widgets) return;
            const target = document.getElementById('vk_groups');
            if (!target) return;
            const size = getVkWidgetSize();
            if (force || !vkWidgetRendered) {
                target.innerHTML = '';
                VK.Widgets.Group('vk_groups', {
                    mode: 4,
                    wide: 1,
                    width: size.width,
                    height: size.height,
                    color1: 'FFFFFF',
                    color2: '000000',
                    color3: '2ea3d0'
                }, 215954534);
                vkWidgetRendered = true;
            }
        }

        function syncVkWidget() {
            window.setTimeout(() => initVkWidget(true), 80);
        }

        let vkResizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(vkResizeTimer);
            vkResizeTimer = setTimeout(() => initVkWidget(true), 180);
        });

        loadAdminNews();
        if (document.readyState === 'complete') initVkWidget();
        else window.addEventListener('load', initVkWidget);
    })();
</script>
